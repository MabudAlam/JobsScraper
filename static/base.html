<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Scraper</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style id="main-style">
        :root {
            --primary: #037729;
            --secondary: #007BFF;
            --background: #f7f9fa;
            --card-bg: #fff;
            --card-border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.07);
            --radius: 10px;
            --text: #222;
        }
        [data-theme="dark"] {
            --primary: #1a3d2b;
            --secondary: #3399ff;
            --background: #181c1f;
            --card-bg: #23272b;
            --card-border: #333;
            --shadow: 0 2px 8px rgba(0,0,0,0.25);
            --text: #f7f9fa;
        }
        [data-theme="dark"] .career-card, [data-theme="dark"] .career-card * {
            color: #fff !important;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background: var(--background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            width: 100%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .navbar .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .navbar .theme-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            margin-left: 18px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .navbar .theme-toggle:hover {
            color: var(--secondary);
        }
        .navbar .searchbar {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: var(--radius);
            padding: 4px 12px;
            box-shadow: var(--shadow);
            margin: 0 16px;
        }
        .navbar .searchbar input[type="text"] {
            border: none;
            outline: none;
            padding: 8px 10px;
            border-radius: var(--radius);
            font-size: 1rem;
            width: 180px;
            background: transparent;
            color: #222;
        }
        .navbar .searchbar input[type="text"]::placeholder {
            color: #aaa;
        }
        .navbar .searchbar .icon {
            color: var(--primary);
            font-size: 1.2rem;
            margin-left: 6px;
            cursor: pointer;
        }
        .navbar .search-button {
            background: var(--secondary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: 600;
            margin-left: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .navbar .search-button:hover {
            background: #0056b3;
        }
        .navbar .filter-options {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar .filter-options select {
            padding: 7px 12px;
            border-radius: var(--radius);
            border: 1px solid #e0e0e0;
            font-size: 1rem;
        }
        .navbar .nav-items {
            display: flex;
            align-items: center;
        }
        .navbar .nav-items a {
            color: #fff;
            font-size: 1.7rem;
            margin-left: 18px;
            transition: color 0.2s;
        }
        .navbar .nav-items a:hover {
            color: #19191b;
        }
        #jobCards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 32px;
            padding: 40px 5vw 80px 5vw;
            flex: 1;
        }
        .career-card {
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 340px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 22px 20px 18px 20px;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .career-card:hover {
            box-shadow: 0 6px 24px rgba(3,119,41,0.13);
            transform: translateY(-4px) scale(1.02);
        }
        .career-card .card-body {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .career-card .company-logo img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }
        .career-card .about {
            flex: 1;
        }
        .career-card .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--primary);
        }
        .career-card .card-text {
            font-size: 0.98rem;
            color: #333;
            margin-bottom: 3px;
        }
        .career-card .apply-button {
            margin-top: 12px;
        }
        .career-card .apply-button a, .career-card .save-job-btn {
            background: var(--secondary);
            color: #fff;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s, transform 0.2s;
            display: inline-block;
            margin-right: 8px;
            border: none;
        }
        .career-card .apply-button a:hover, .career-card .save-job-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        .centered-message {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 40vh;
            font-size: 1.2rem;
            color: #333;
        }
        #scrollTop {
            display: inline-block;
            background: var(--primary);
            width: 48px;
            height: 48px;
            text-align: center;
            border-radius: 50%;
            position: fixed;
            bottom: 32px;
            right: 32px;
            transition: background 0.3s, opacity 0.5s, visibility 0.5s;
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
        }
        #scrollTop::after {
            content: "\f077";
            font-family: FontAwesome;
            font-size: 2em;
            line-height: 48px;
            color: #fff;
        }
        #scrollTop.show {
            opacity: 1;
            visibility: visible;
        }
        #scrollTop:hover {
            background: #333;
            cursor: pointer;
        }
        footer {
            background: var(--primary);
            color: #fff;
            padding: 18px 0 12px 0;
            text-align: center;
            font-size: 1rem;
            margin-top: auto;
        }
        @media (max-width: 1100px) {
            #jobCards {
                gap: 18px;
            }
            .career-card {
                width: 90vw;
                max-width: 420px;
            }
        }
        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
                padding: 14px 4vw;
            }
            .navbar .logo {
                margin-bottom: 10px;
            }
            .navbar .searchbar {
                margin: 8px 0;
            }
            .navbar .filter-options {
                flex-direction: column;
                gap: 6px;
                margin: 8px 0;
            }
            #jobCards {
                padding: 24px 2vw 80px 2vw;
            }
            .career-card {
                width: 98vw;
                max-width: 98vw;
                padding: 16px 8px 12px 8px;
            }
        }
    </style>
</head>
<body>

        </div>
        <button class="search-button" id="searchButton">Search</button>
        <div class="filter-options">
            <select id="locationFilter">

                <option value="Jaipur">Jaipur</option>

                <option value="niyo">Niyo Solutions</option>

                <option value="paytm">Paytm</option>

            </select>
        </div>
        <div class="nav-items">
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode"><i class="fas fa-moon"></i></button>
            <button class="search-button" id="showSavedJobsBtn" style="margin-left:10px;">Saved Jobs</button>
            <!-- <button class="search-button" id="showPostJobBtn" style="margin-left:10px;">Post a Job</button> -->
            <a href="https://github.com/Pavel401/Jobs-Scraper" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
    </nav>
    <main>

        <div id="postJobDialog" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.35);z-index:10000;align-items:center;justify-content:center;">

        <div id="jobCards"></div>
        <div id="savedJobsDialog" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.35);z-index:10000;align-items:center;justify-content:center;">
            <div style="background:var(--card-bg);box-shadow:var(--shadow);border-radius:var(--radius);padding:32px 24px 18px 24px;max-width:700px;width:98vw;position:relative;max-height:90vh;overflow-y:auto;">
                <button id="closeSavedJobsDialog" style="position:absolute;top:10px;right:10px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--primary);">&times;</button>
                <h2 style="margin-bottom:18px;font-size:1.3rem;color:var(--primary);font-weight:700;">Saved Jobs</h2>
                <div id="savedJobsCards"></div>
            </div>
        </div>
        <a id="scrollTop"></a>
    </main>
    <footer>
        <p>Made with ❤️ by developers</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        let allJobsData = [];
        let selectedFilters = { location: '', company: '' };
        let savedJobs = JSON.parse(localStorage.getItem('savedJobs') || '[]');

        async function fetchAndDisplayJobs() {
            try {
                const response = await fetch(`${window.location.href}getallJobsFromSQL`);
                if (!response.ok) throw new Error('Network response was not ok');
                allJobsData = await response.json();
                displayJobs(allJobsData);
            } catch (error) {
                displayJobs([]);
            }
        }

        function isJobSaved(job) {
            return savedJobs.some(j => j.title === job.title && j.company === job.company && j.location === job.location);
        }

        function displayJobs(data, containerId = 'jobCards') {
            const jobCardsContainer = document.getElementById(containerId);
            jobCardsContainer.innerHTML = '';
            if (data.length === 0) {
                const centeredMessage = document.createElement('div');
                centeredMessage.className = 'centered-message';
                centeredMessage.innerHTML = `<div><p>Sorry, no jobs found.</p></div>`;
                jobCardsContainer.appendChild(centeredMessage);
            } else {
                data.forEach(job => {
                    const card = document.createElement('div');
                    card.className = 'career-card';
                    const saved = isJobSaved(job);
                    card.innerHTML = `
                        <div class="card-body">
                            <div class="company-logo">
                                <img src="${job.ImageUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(job.company)}" alt="${job.title}" />
                            </div>
                            <div class="about">
                                <div class="card-title">${job.title}</div>
                                <div class="card-text"><strong>Location:</strong> <span>${job.location}</span></div>
                                <div class="card-text"><strong>Company:</strong> <span>${job.company}</span></div>
                            </div>
                        </div>
                        <div class="apply-button">
                            <a href="${job.applyUrl}" target="_blank" rel="noopener noreferrer">Apply Now</a>
                            <button class="save-job-btn" data-title="${encodeURIComponent(job.title)}" data-company="${encodeURIComponent(job.company)}" data-location="${encodeURIComponent(job.location)}">${saved ? 'Unsave' : 'Save'}</button>
                        </div>
                    `;
                    jobCardsContainer.appendChild(card);
                });
                // Add event listeners for save/unsave buttons
                jobCardsContainer.querySelectorAll('.save-job-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const title = decodeURIComponent(this.getAttribute('data-title'));
                        const company = decodeURIComponent(this.getAttribute('data-company'));
                        const location = decodeURIComponent(this.getAttribute('data-location'));
                        const job = allJobsData.find(j => j.title === title && j.company === company && j.location === location);
                        if (isJobSaved(job)) {
                            savedJobs = savedJobs.filter(j => !(j.title === job.title && j.company === job.company && j.location === job.location));
                            localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
                            this.textContent = 'Save';
                        } else {
                            savedJobs.push(job);
                            localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
                            this.textContent = 'Unsave';
                        }
                    });
                });
            }
        }

        function performFilterSearch() {
            const filteredJobs = allJobsData.filter(job =>
                (selectedFilters.location === '' || job.location.toLowerCase().includes(selectedFilters.location.toLowerCase())) &&
                (selectedFilters.company === '' || job.company.toLowerCase().includes(selectedFilters.company.toLowerCase()))
            );
            displayJobs(filteredJobs);
        }

        function performSearch() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filteredJobs = allJobsData.filter(job =>
                job.title.toLowerCase().includes(searchQuery) ||
                job.location.toLowerCase().includes(searchQuery) ||
                job.company.toLowerCase().includes(searchQuery)
            );
            displayJobs(filteredJobs);
        }

        // Job posting form
        document.addEventListener('DOMContentLoaded', () => {
            fetchAndDisplayJobs();
            document.getElementById('locationFilter').addEventListener('change', function () {
                selectedFilters.location = this.value;
                performFilterSearch();
            });
            document.getElementById('companyFilter').addEventListener('change', function () {
                selectedFilters.company = this.value;
                performFilterSearch();
            });
            document.getElementById('searchButton').addEventListener('click', performSearch);
            document.getElementById('searchInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });
            document.getElementById('searchInput').addEventListener('input', performSearch);
            // Scroll to top button
            var btn = $('#scrollTop');
            $(window).scroll(function () {
                if ($(window).scrollTop() > 300) {
                    btn.addClass('show');
                } else {
                    btn.removeClass('show');
                }
            });
            btn.on('click', function (e) {
                e.preventDefault();
                $('html, body').animate({ scrollTop: 0 }, '300');
            });

            // Floating Post Job Dialog (commented out)
            // const postJobDialog = document.getElementById('postJobDialog');
            // const showPostJobBtn = document.getElementById('showPostJobBtn');
            // const closePostJobDialog = document.getElementById('closePostJobDialog');
            // showPostJobBtn.addEventListener('click', () => {
            //     postJobDialog.style.display = 'flex';
            // });
            // closePostJobDialog.addEventListener('click', () => {
            //     postJobDialog.style.display = 'none';
            // });
            // postJobDialog.addEventListener('click', (e) => {
            //     if (e.target === postJobDialog) postJobDialog.style.display = 'none';
            // });
            // Job posting form (commented out)
            // document.getElementById('jobPostForm').addEventListener('submit', function(e) {
            //     e.preventDefault();
            //     const title = document.getElementById('jobTitle').value.trim();
            //     const company = document.getElementById('jobCompany').value.trim();
            //     const location = document.getElementById('jobLocation').value.trim();
            //     const applyUrl = document.getElementById('jobApplyUrl').value.trim();
            //     const imageUrl = document.getElementById('jobImageUrl').value.trim();
            //     if (!title || !company || !location || !applyUrl) return;
            //     const newJob = { title, company, location, applyUrl, ImageUrl: imageUrl };
            //     allJobsData.unshift(newJob);
            //     displayJobs(allJobsData);
            //     this.reset();
            //     postJobDialog.style.display = 'none';
            // });

            // Saved Jobs Dialog
            const savedJobsDialog = document.getElementById('savedJobsDialog');
            const showSavedJobsBtn = document.getElementById('showSavedJobsBtn');
            const closeSavedJobsDialog = document.getElementById('closeSavedJobsDialog');
            showSavedJobsBtn.addEventListener('click', () => {
                displayJobs(savedJobs, 'savedJobsCards');
                savedJobsDialog.style.display = 'flex';
            });
            closeSavedJobsDialog.addEventListener('click', () => {
                savedJobsDialog.style.display = 'none';
            });
            savedJobsDialog.addEventListener('click', (e) => {
                if (e.target === savedJobsDialog) savedJobsDialog.style.display = 'none';
            });

            // Dark mode toggle
            const themeToggle = document.getElementById('themeToggle');
            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                themeToggle.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
            themeToggle.addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme') || localStorage.getItem('theme') || 'light';
                setTheme(current === 'dark' ? 'light' : 'dark');
            });
            // On load, set theme from localStorage
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            setTheme(savedTheme);
        });
    </script>
</body>
</html>
