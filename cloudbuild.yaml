steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: [
      "build",
      "-t", "asia-south1-docker.pkg.dev/mealai-f58b5/jobscraper/jobscraper-server:latest",
      "."
    ]

  # Step 2: Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [
      "push",
      "asia-south1-docker.pkg.dev/mealai-f58b5/jobscraper/jobscraper-server:latest"
    ]

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args: [
      "run", "deploy", "jobscraper-server",  # service name
      "--image", "asia-south1-docker.pkg.dev/mealai-f58b5/jobscraper/jobscraper-server:latest",
      "--region", "us-central1",
      "--platform", "managed",
      "--allow-unauthenticated"
    ]
options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "asia-south1-docker.pkg.dev/mealai-f58b5/jobscraper/jobscraper-server:latest"
